spring.application.name=backend
logging.level.org.springframework.security=DEBUG

# Configurazione per database H2 persistente su file
# Il file del database verrà creato nella cartella 'data' all'interno del tuo progetto
spring.datasource.url=jdbc:h2:file:./data/oleum_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Imposta la piattaforma per il dialetto Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Aggiorna lo schema automaticamente senza cancellare i dati a ogni avvio
spring.jpa.hibernate.ddl-auto=update
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm testata-sito sticky-top">
  <div class="container-fluid px-4">
    
    <a class="navbar-brand titolo-brand fw-bold" 
       routerLink="/" 
       style="color: #3b4d2e; font-family: 'Georgia', serif;">
      OLEUM FAMILIAE
    </a>

    <button class="navbar-toggler" 
            type="button" 
            data-bs-toggle="collapse" 
            data-bs-target="#navbarNav"
            (click)="toggleMenu()">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="navbarNav" [class.show]="isMenuAperto">
      <ul class="navbar-nav gap-4" 
          style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 0.95rem; font-weight: 500; letter-spacing: 1px;">
        <li class="nav-item">
          <a class="nav-link text-dark" routerLink="/" (click)="chiudiMenu()">HOME</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-dark" routerLink="/storia" (click)="chiudiMenu()">LA STORIA</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-dark" routerLink="/tenute" (click)="chiudiMenu()">LE TENUTE</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-dark" routerLink="/prodotti" (click)="chiudiMenu()">I NOSTRI PRODOTTI</a>
        </li>
      </ul>
    </div>

    <div class="d-flex align-items-center">
      
      <a class="btn btn-nav-carrello ms-3 d-flex align-items-center" routerLink="/carrello" 
         style="border: 1px solid #3b4d2e; color: #3b4d2e; border-radius: 20px; padding: 6px 20px; font-weight: 500; transition: all 0.3s;">
        Carrello
        <span class="badge rounded-pill ms-2" 
              style="background-color: #3b4d2e; color: #ffffff; font-weight: 700; font-size: 0.75rem; padding: 3px 9px;" 
              *ngIf="contatore > 0">
          {{ contatore }}
        </span>
      </a>

      <ng-container *ngIf="!utenteService.isLoggedIn()">
        <a class="btn ms-3 d-flex align-items-center" routerLink="/login"
           style="background-color: #3b4d2e; color: #ffffff; border-radius: 20px; padding: 6px 20px; font-weight: 500; border: 1px solid #3b4d2e; transition: all 0.3s;">
          Accedi
        </a>
      </ng-container>

      <ng-container *ngIf="utenteService.isLoggedIn()">
        
        <div class="dropdown ms-3">
          <a class="btn d-flex align-items-center dropdown-toggle" 
             (click)="toggleDropdown()"
             style="background-color: #3b4d2e; color: #ffffff; border-radius: 20px; padding: 6px 20px; font-weight: 500; border: 1px solid #3b4d2e; cursor: pointer;">
            Area Personale
          </a>

          <ul class="dropdown-menu dropdown-menu-end shadow border-0" 
              [class.show]="isDropdownAperto" 
              style="border-radius: 15px; margin-top: 10px; display: block;" 
              *ngIf="isDropdownAperto">
            <li>
              <a class="dropdown-item py-2" routerLink="/profilo" [queryParams]="{ tab: 'ordini' }" (click)="chiudiDropdown()" style="color: #3b4d2e; font-weight: 500;">
                Cronologia Ordini
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item py-2" routerLink="/profilo" [queryParams]="{ tab: 'recensioni' }" (click)="chiudiDropdown()" style="color: #3b4d2e; font-weight: 500;">
                Le Mie Recensioni
              </a>
            </li>
          </ul>
        </div>
        
        <button class="btn ms-3 d-flex align-items-center" (click)="logout()"
                style="border: 1px solid #dc3545; color: #dc3545; background-color: transparent; border-radius: 20px; padding: 6px 20px; font-weight: 500; transition: all 0.3s;">
          Esci
        </button>
      </ng-container>

    </div>

  </div>
</nav>

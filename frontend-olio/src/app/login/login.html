<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card login-card">
        <div class="card-body p-4">
          <h3 class="text-center mb-4 login-title">Accedi</h3>
          
          <div *ngIf="messaggioErrore" class="alert alert-danger" role="alert">
            {{ messaggioErrore }}
          </div>

          <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input 
                type="email" 
                class="form-control" 
                id="email" 
                name="email" 
                [(ngModel)]="credenziali.email" 
                required 
                #email="ngModel">
            </div>

            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <input 
                type="password" 
                class="form-control" 
                id="password" 
                name="password" 
                [(ngModel)]="credenziali.password" 
                required 
                #password="ngModel">
            </div>

            <div class="d-grid">
              <button 
                type="submit" 
                class="login-btn btn" 
                [disabled]="loginForm.invalid">
                Entra nell'area personale
              </button>
            </div>
          </form>
          
          <div class="mt-4 text-center">
            <span class="text-muted">Non hai ancora un account?</span><br>
            <a routerLink="/registrazione" style="color: #c2a878; font-weight: 600; text-decoration: none; cursor: pointer;">
              Registrati qui
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

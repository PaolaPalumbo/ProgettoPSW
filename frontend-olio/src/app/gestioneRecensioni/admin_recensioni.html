<div class="container mt-5 mb-5">
  <div class="sfondo-panna text-center py-4 mb-4 rounded">
    <h2 class="titolo-olio mb-0">Pannello di Moderazione</h2>
    <p class="sottotitolo mt-2">Gestione dei feedback in attesa di approvazione</p>
  </div>

  <div class="alert alert-success text-center" style="background-color: #fafafa; border-color: #c2a878; color: #3b4d2e;" *ngIf="recensioniInSospeso.length === 0">
    <i class="bi bi-check-circle-fill"></i> Non ci sono recensioni in attesa di moderazione. Ottimo lavoro!
  </div>

  <div class="row g-4">
    <div class="col-md-6" *ngFor="let rec of recensioniInSospeso">
      <div class="card shadow-sm h-100 border-0" style="border-left: 4px solid #c2a878 !important;">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
            <h5 class="mb-0" style="color: #3b4d2e; font-weight: bold;">
              {{ rec.prodotto?.nome }}
            </h5>
            <span class="badge" style="background-color: #c2a878; color: white;">
              {{ rec.voto }} ★
            </span>
          </div>
          
          <h6 class="text-muted small mb-3">Autore: <strong>{{ rec.utente?.nome || 'Cliente Anonimo' }}</strong></h6>
          <p class="card-text mb-4" style="font-style: italic;">"{{ rec.commento }}"</p>
          
          <div class="text-end mt-auto">
            <button class="btn btn-sm w-100" style="background-color: #3b4d2e; color: white;" (click)="approva(rec)">
              <i class="bi bi-check2-square"></i> Approva e Pubblica
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

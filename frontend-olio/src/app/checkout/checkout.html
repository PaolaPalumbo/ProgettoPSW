<div class="checkout-container">
  <h2>Checkout: Conferma Ordine</h2>
  
  <form [formGroup]="checkoutForm" (ngSubmit)="confermaOrdine()" class="checkout-form">
    
    <div class="form-group">
      <label for="indirizzo">Indirizzo di spedizione</label>
      <input id="indirizzo" formControlName="indirizzoSpedizione" placeholder="Via/Piazza, numero civico">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="citta">Città</label>
        <input id="citta" formControlName="citta" placeholder="Inserisci città">
      </div>
      
      <div class="form-group">
        <label for="cap">CAP</label>
        <input id="cap" formControlName="cap" placeholder="5 cifre">
      </div>
    </div>

    <button type="submit" [disabled]="!checkoutForm.valid" class="btn-submit">
      Completa Ordine
    </button>
  </form>
</div>
